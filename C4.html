<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ Thống Thi Trắc Nghiệm</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0
}

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  min-height:100vh
}

/* NÚT QUAY LẠI */

.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  background:#111827;
  color:#fff;
  text-decoration:none;
  padding:12px 18px;
  border-radius:12px;
  font-weight:600;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  transition:.2s;
  z-index:999;
}

.back-btn:hover{
  background:#2563eb;
  transform:translateY(-2px);
}

#app{
  max-width:860px;
  margin:auto;
  padding:1.5rem
}

.header{
  text-align:center;
  padding:1.5rem 0 2rem
}

.header h1{
  font-size:26px;
  font-weight:700;
  color:#1a1a1a;
  margin-bottom:6px
}

.header p{
  font-size:14px;
  color:#888
}

.upload-card{
  background:#fff;
  border:1px solid #e0e0e0;
  border-radius:14px;
  padding:1.5rem;
  margin-bottom:1.5rem;
  display:flex;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
  box-shadow:0 2px 8px rgba(0,0,0,0.06)
}

#fileName{
  flex:1;
  padding:14px;
  border:1px solid #d1d5db;
  border-radius:12px;
  font-size:15px;
  outline:none;
}

#fileName:focus{
  border-color:#2563eb;
}

#runBtn{
  display:flex;
  align-items:center;
  gap:6px;
  padding:10px 22px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:15px;
  font-weight:600;
  white-space:nowrap;
  transition:background .15s
}

#runBtn:hover{
  background:#1d4ed8
}

#runBtn:disabled{
  background:#93c5fd;
  cursor:not-allowed
}

#stats{
  display:flex;
  gap:12px;
  margin-bottom:1.5rem;
  flex-wrap:wrap
}

.stat{
  flex:1;
  min-width:90px;
  background:#fff;
  border:1px solid #e0e0e0;
  border-radius:12px;
  padding:.75rem 1rem;
  text-align:center;
  box-shadow:0 1px 4px rgba(0,0,0,0.05)
}

.stat-n{
  font-size:24px;
  font-weight:700;
  color:#1a1a1a
}

.stat-l{
  font-size:12px;
  color:#888;
  margin-top:2px
}

.stat.s-correct .stat-n{
  color:#16a34a
}

.stat.s-wrong .stat-n{
  color:#dc2626
}

.stat.s-left .stat-n{
  color:#2563eb
}

.question{
  background:#fff;
  border:1px solid #e0e0e0;
  border-radius:14px;
  padding:1.25rem 1.5rem;
  margin-bottom:1.25rem;
  box-shadow:0 2px 8px rgba(0,0,0,0.05)
}

.q-meta{
  display:flex;
  gap:8px;
  margin-bottom:.75rem;
  flex-wrap:wrap
}

.badge{
  font-size:11px;
  padding:3px 10px;
  border-radius:20px;
  font-weight:600
}

.badge-num{
  background:#f3f4f6;
  color:#374151
}

.badge-level{
  background:#dbeafe;
  color:#1d4ed8
}

.badge-topic{
  background:#f3f4f6;
  color:#6b7280
}

.q-title{
  font-size:15px;
  line-height:1.7;
  color:#1a1a1a;
  margin-bottom:1rem
}

.options{
  display:flex;
  flex-direction:column;
  gap:8px
}

.opt{
  border:1.5px solid #e0e0e0;
  border-radius:10px;
  padding:12px 14px;
  cursor:pointer;
  font-size:14px;
  color:#1a1a1a;
  transition:background .12s,border-color .12s;
  display:flex;
  align-items:flex-start;
  gap:10px;
  line-height:1.6
}

.opt:hover{
  background:#f0f4ff;
  border-color:#93c5fd
}

.opt.correct{
  background:#dcfce7;
  border-color:#16a34a;
  color:#15803d
}

.opt.wrong{
  background:#fee2e2;
  border-color:#dc2626;
  color:#b91c1c
}

.opt.disabled{
  pointer-events:none
}

.opt-letter{
  font-weight:700;
  min-width:18px
}

.answer-box{
  margin-top:1rem;
  background:#f8faff;
  border:1px solid #dbeafe;
  border-radius:10px;
  padding:14px;
  font-size:14px;
  line-height:1.7;
  display:none;
  color:#374151
}

.answer-box b{
  color:#1a1a1a
}

.empty{
  text-align:center;
  padding:3rem 1rem;
  color:#aaa;
  font-size:14px
}

@media(max-width:700px){

  .upload-card{
    flex-direction:column;
  }

  #runBtn{
    width:100%;
    justify-content:center;
  }

  .back-btn{
    top:12px;
    left:12px;
    padding:10px 14px;
    font-size:14px;
  }

}
</style>
</head>

<body>

<!-- NÚT QUAY LẠI -->
<a href="index.html" class="back-btn">
  ← Quay lại
</a>

<div id="app">

  <div class="header">
    <h1>🎓 Hệ Thống Thi Trắc Nghiệm kiến trúc máy tính chương 4</h1>
    <p>Nhập tên file DOCX để bắt đầu luyện thi</p>
  </div>

  <div class="upload-card">

    <input
      type="text"
      id="fileName"
      placeholder="Ví dụ: C1 hoặc DeThi"
    >

    <button id="runBtn">
      ▶ Bắt đầu
    </button>

  </div>

  <div id="stats" style="display:none">

    <div class="stat">
      <div class="stat-n" id="sTotal">0</div>
      <div class="stat-l">Tổng câu</div>
    </div>

    <div class="stat s-correct">
      <div class="stat-n" id="sCorrect">0</div>
      <div class="stat-l">Đúng</div>
    </div>

    <div class="stat s-wrong">
      <div class="stat-n" id="sWrong">0</div>
      <div class="stat-l">Sai</div>
    </div>

    <div class="stat s-left">
      <div class="stat-n" id="sLeft">0</div>
      <div class="stat-l">Chưa làm</div>
    </div>

  </div>

  <div id="quiz">

    <div class="empty">
      Nhập tên file DOCX rồi nhấn "Bắt đầu"
    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

<script>

const $ = id => document.getElementById(id);

let correct = 0;
let wrong = 0;
let total = 0;

$('runBtn').onclick = async () => {

  const name = $('fileName').value.trim();

  if(!name){
    alert('Vui lòng nhập tên file');
    return;
  }

  const filePath = name + '.docx';

  $('runBtn').disabled = true;
  $('runBtn').textContent = 'Đang tải...';

  $('quiz').innerHTML = `
    <div class="empty">
      Đang đọc file ${filePath}...
    </div>
  `;

  try {

    const response = await fetch(filePath);

    if(!response.ok){
      throw new Error('Không tìm thấy file ' + filePath);
    }

    const arrayBuffer = await response.arrayBuffer();

    const result = await mammoth.extractRawText({
      arrayBuffer: arrayBuffer
    });

    parseAndRender(result.value);

  } catch(e) {

    $('quiz').innerHTML = `
      <div class="empty">
        ${e.message}
      </div>
    `;

  }

  $('runBtn').disabled = false;
  $('runBtn').textContent = '▶ Bắt đầu';
};

function shuffle(a){

  for(let i=a.length-1;i>0;i--){

    const j=Math.floor(Math.random()*(i+1));

    [a[i],a[j]]=[a[j],a[i]];
  }

  return a;
}

function updateStats(){

  $('sTotal').textContent = total;
  $('sCorrect').textContent = correct;
  $('sWrong').textContent = wrong;
  $('sLeft').textContent = total - correct - wrong;
}

function normalizeLine(text) {

  text = text.replace(/([^\n])([A-D])\.\s*/g, (m, before, letter) => {
    return before + '\n' + letter + '. ';
  });

  text = text.replace(/([^\n])(Đáp án đúng)/g, '$1\n$2');

  text = text.replace(/([^\n])(Giải thích)/g, '$1\n$2');

  return text;
}

function parseAndRender(rawText) {

  const quiz = $('quiz');

  quiz.innerHTML = '';

  correct = 0;
  wrong = 0;
  total = 0;

  $('stats').style.display = 'flex';

  const blocks = rawText
    .split(/(?=Câu\s+\d+[\.\[])/g)
    .map(b => b.trim())
    .filter(b => b && /^Câu\s+\d+/i.test(b));

  if(!blocks.length){

    quiz.innerHTML = `
      <div class="empty">
        Không tìm thấy câu hỏi nào. Kiểm tra định dạng file.
      </div>
    `;

    return;
  }

  let rendered = 0;

  blocks.forEach(block => {

    const normalized = normalizeLine(block);

    const lines = normalized
      .split('\n')
      .map(l => l.trim())
      .filter(l => l);

    let questionLines = [];
    let options = [];
    let correctLetter = '';
    let explainLines = [];
    let inExplain = false;

    lines.forEach(line => {

      const clean = line.replace(/^[·•\-\*]\s+/, '').trim();

      if(/^[A-D]\.\s+/.test(clean) || /^[A-D]\.[^\s]/.test(clean)){

        const letter = clean[0];

        const text = clean.substring(2).trim();

        if(text){
          options.push({ letter, text });
        }

        inExplain = false;

        return;
      }

      if(/^Đáp án đúng\s*:/i.test(clean)){

        const m = clean.match(/:\s*([A-D])/i);

        if(m){
          correctLetter = m[1].toUpperCase();
        }

        inExplain = false;

        return;
      }

      if(/^Giải thích/i.test(clean)){

        const after = clean
          .replace(/^Giải thích(\s*chi tiết)?\s*:\s*/i, '')
          .trim();

        explainLines = after ? [after] : [];

        inExplain = true;

        return;
      }

      if(inExplain){

        explainLines.push(clean);

        return;
      }

      questionLines.push(clean);

    });

    if(options.length < 2 || !correctLetter) return;

    const correctOption = options.find(
      o => o.letter === correctLetter
    );

    if(!correctOption) return;

    total++;

    const firstLine = questionLines[0] || '';

    const levelMatch = firstLine.match(/\[([^\]]+)\]/);

    const metaLevel = levelMatch
      ? levelMatch[1]
      : '';

    const dashMatch = firstLine.match(/\]\s*-\s*(.+)/);

    const metaTopic = dashMatch
      ? dashMatch[1].trim()
      : '';

    const explain = explainLines.join(' ');

    const shuffled = shuffle([...options]);

    const letters = ['A','B','C','D'];

    shuffled.forEach((o,i) => {
      o.newLetter = letters[i];
    });

    const newCorrect = shuffled.find(
      o => o.text === correctOption.text
    ).newLetter;

    rendered++;

    const div = document.createElement('div');

    div.className = 'question';

    const metaHTML = `
      <div class="q-meta">

        <span class="badge badge-num">
          Câu ${rendered}
        </span>

        ${metaLevel
          ? `<span class="badge badge-level">${metaLevel}</span>`
          : ''
        }

        ${metaTopic
          ? `<span class="badge badge-topic">${metaTopic}</span>`
          : ''
        }

      </div>
    `;

    const optsHTML = shuffled.map(o => `

      <div class="opt" data-letter="${o.newLetter}">

        <span class="opt-letter">
          ${o.newLetter}.
        </span>

        <span>
          ${o.text}
        </span>

      </div>

    `).join('');

    div.innerHTML = `

      ${metaHTML}

      <div class="q-title">
        ${questionLines.join('<br>')}
      </div>

      <div class="options">
        ${optsHTML}
      </div>

      <div class="answer-box">

        <b>Đáp án đúng: ${newCorrect}</b>

        <br><br>

        ${explain || '<em>Không có giải thích.</em>'}

      </div>
    `;

    quiz.appendChild(div);

    const opts = div.querySelectorAll('.opt');

    const ansBox = div.querySelector('.answer-box');

    let answered = false;

    opts.forEach(el => {

      el.addEventListener('click', () => {

        if(answered) return;

        answered = true;

        opts.forEach(op => {

          op.classList.add('disabled');

          if(op.dataset.letter === newCorrect){
            op.classList.add('correct');
          }

        });

        if(el.dataset.letter !== newCorrect){

          el.classList.add('wrong');

          wrong++;

        } else {

          correct++;
        }

        ansBox.style.display = 'block';

        updateStats();

      });

    });

  });

  updateStats();

  if(!rendered){

    quiz.innerHTML = `
      <div class="empty">
        Không tìm thấy câu hỏi hợp lệ.
      </div>
    `;
  }
}
</script>

</body>
</html>
