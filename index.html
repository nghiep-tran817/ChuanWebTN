<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hệ Thống Thi Trắc Nghiệm kiến trúc máy tính </title>


  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:"Segoe UI", sans-serif;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    /* Container chứa các nút */
    .button-group{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      justify-content:center;
      width:100%;
      max-width:900px;
    }

    /* Style nút */
    .nav-btn{
      flex:1;
      min-width:200px;
      padding:18px 25px;
      border:none;
      border-radius:14px;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      color:white;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      box-shadow:0 8px 20px rgba(0,0,0,0.3);
    }

    .nav-btn:hover{
      transform:translateY(-4px) scale(1.03);
      box-shadow:0 12px 25px rgba(0,0,0,0.4);
    }

    /* Laptop/Desktop -> nằm ngang */
    @media (min-width: 768px){
      .button-group{
        flex-direction:row;
      }
    }

    /* Điện thoại -> nằm dọc */
    @media (max-width: 767px){
      .button-group{
        flex-direction:column;
      }

      .nav-btn{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <div class="button-group">

    <button class="nav-btn"
      onclick="window.location.href='C1235689.html'">
      Đi tới C1235689
    </button>

    <button class="nav-btn"
      onclick="window.location.href='C4.html'">
      Đi tới C4
    </button>

    <button class="nav-btn"
      onclick="window.location.href='C7.html'">
      Đi tới C7
    </button>

  </div>

</body>
</html>
